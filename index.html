
<!DOCTYPE html>
<html>
<head>
<title>FasalXpert</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

<h1>🌾 FasalXpert</h1>
<p>AI Assistant for Farmers</p>

<h3>Upload Crop Image</h3>
<input type="file" id="imageInput">
<br><br>
<button onclick="uploadImage()">Detect Disease</button>

<h3>Result</h3>
<p id="result"></p>

<hr>

<h3>🎤 Voice Assistant</h3>
<button onclick="startVoice()">Ask by Voice</button>

<hr>

<h3>🌦 Weather</h3>
<p id="weather"></p>
<button onclick="getWeather()">Check Weather</button>

<hr>

<h3>💬 Ask Crop Question</h3>
<input type="text" id="question" placeholder="Ask about crops">
<button onclick="askQuestion()">Ask</button>

<p id="answer"></p>

</div>

<script src="/static/script.js"></script>

</body>
</html>
